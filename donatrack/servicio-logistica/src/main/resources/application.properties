spring.application.name=servicio-logistica
server.port=8085

# URL base de este servicio, usada para armar la callbackUrl que se le pasa
# al proveedor externo de ruteo.
servicio-logistica.base-url=http://localhost:8085

# URL del proveedor externo de planificacion de rutas
integraciones.proveedor-ruteo.url=http://localhost:9090/ruteo/planificar

# Maximo de donaciones que el proveedor externo procesa por lote
integraciones.proveedor-ruteo.max-donaciones-por-lote=100

# URL del webhook de n8n que dispara las notificaciones de logistica
# (inicio de ruta, entrega confirmada, entrega no recibida).
# servicio-logistica NO llama a servicio-notificaciones directamente: solo
# publica el evento en n8n y es el flujo de n8n el que decide notificar.
integraciones.n8n.webhook.url=http://localhost:5678/webhook/logistica-evento

# El parent incluye spring-boot-docker-compose; sin un compose.yaml el arranque
# falla. Como los servicios usan repositorios en memoria, se desactiva.
spring.docker.compose.enabled=false
