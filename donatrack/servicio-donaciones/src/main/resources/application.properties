spring.application.name=servicio-donaciones
server.port=8081

# URL del servicio-notificaciones (POST /notificaciones)
notificaciones.url=http://localhost:8084

# URL del servicio-incentivos (POST /api/incentivos/donantes/...)
servicios.incentivos.url=http://localhost:8083

# El parent incluye spring-boot-docker-compose; sin un compose.yaml el arranque
# falla. Como los servicios usan repositorios en memoria, se desactiva.
spring.docker.compose.enabled=false
