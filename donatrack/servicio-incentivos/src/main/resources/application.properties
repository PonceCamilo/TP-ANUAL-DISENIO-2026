spring.application.name=servicio-incentivos
server.port=8083

# URL del servicio-notificaciones (se puede sobreescribir con variable de entorno)
servicios.notificaciones.url=http://localhost:8084

# URL del webhook de n8n que dispara la automatización de insignias
# (generación de imagen + publicación en la red social elegida)
integraciones.n8n.webhook.url=http://localhost:5678/webhook/insignia-obtenida

# El parent incluye spring-boot-docker-compose; sin un compose.yaml el arranque
# falla. Como los servicios usan repositorios en memoria, se desactiva.
spring.docker.compose.enabled=false
